name: conformance
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["conformance/**"]
permissions:
  contents: read
  packages: write
defaults:
  run:
    shell: bash
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          submodules: true
      - name: Setup Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c #v4.2.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare
        id: prep
        run: |
          cd ./conformance/distribution-spec/conformance
          VERSION=$(git rev-parse --short HEAD)
          git apply ../../mirror.patch
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a #v7.3.0
        with:
          push: true
          builder: ${{ steps.buildx.outputs.name }}
          context: ./conformance/distribution-spec/conformance
          platforms: linux/amd64
          tags: ghcr.io/spegel-org/test-images/conformance:${{ steps.prep.outputs.VERSION }}
          sbom: false
          provenance: false
  cleanup:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Delete untagged images
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 #v5.0.0
        with:
          package-name: "test-images/conformance"
          package-type: "container"
          min-versions-to-keep: 0
          delete-only-untagged-versions: true
