name: kind
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["kind/**"]
permissions:
  contents: read
  packages: write
defaults:
  run:
    shell: bash
jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
    steps:
      - name: Clone repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
      - name: Get versions
        id: versions
        run: |
          versions=$(yq '.versions' kind/versions.yaml -o json | jq -c '.')
          echo "versions=$versions" >> $GITHUB_OUTPUT
  release:
    needs: versions
    strategy:
      matrix:
        version: ${{ fromJson(needs.versions.outputs.versions) }}
    runs-on: ubuntu-latest
    env:
      KIND_VERSION: v0.32.0
    steps:
      - name: Clone repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc #v1.14.0
        with:
          version: ${{ env.KIND_VERSION }}
          install_only: true
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build kind node image
        run: |
          IMAGE=ghcr.io/spegel-org/test-images/kind-node:${{ env.KIND_VERSION }}-v${{ matrix.version }}
          kind build node-image --image $IMAGE ${{ matrix.version }}
          docker push $IMAGE
  cleanup:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Delete untagged images
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 #v5.0.0
        with:
          package-name: "test-images/kind-node"
          package-type: "container"
          min-versions-to-keep: 0
          delete-only-untagged-versions: true
