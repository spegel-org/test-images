name: kind
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["kind/**"]
permissions:
  contents: read
  packages: write
defaults:
  run:
    shell: bash
jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
      - name: Get versions
        id: versions
        run: |
          versions=$(cat kind/versions.yaml | yq '.versions | tojson')
          echo "versions=$versions" >> $GITHUB_OUTPUT
  release:
    needs: versions
    strategy:
      matrix:
        version: ${{ fromJson(needs.versions.outputs.versions) }}
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc #v1.14.0
        with:
          version: v0.31.0
          install_only: true
      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 #v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build kind node image
        run: kind build node-image --image ghcr.io/spegel-org/test-images/kind-node:${{ matrix.version }} ${{ matrix.version }}
      - name: Push image
        uses: docker/build-push-action@0adf9959216b96bec444f325f1e493d4aa344497 #v6.14.0
        with:
          push: true
          tags: ghcr.io/spegel-org/test-images/kind:${{ matrix.version }}
